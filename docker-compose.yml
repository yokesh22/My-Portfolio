services:
  # LocalStack — local AWS emulator (SQS + DynamoDB for the contact form flow)
  localstack:
    image: localstack/localstack:3
    container_name: portfolio-localstack
    ports:
      - "4566:4566" # single edge port for all AWS services
    environment:
      - SERVICES=sqs,dynamodb
      - DEBUG=0
      - AWS_DEFAULT_REGION=ap-south-1
    volumes:
      # init script auto-runs once LocalStack is ready (creates queue + table)
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL — for the blog/CMS (Phase 2.6, wired in later)
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=portfolio
      - POSTGRES_PASSWORD=portfolio
      - POSTGRES_DB=portfolio
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
